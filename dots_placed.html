<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Case Dots (Cluster by Issue Area or Court Type)</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    .overlay-box {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 20;
      width: 320px;
      height: 100vh;
      box-sizing: border-box;
      padding: 20px 18px;
      background: rgba(255, 255, 255, 0.97);
      border-right: 1px solid #000;
      line-height: 1.4;
      overflow-y: auto;
    }

    .chart-scroll {
      position: fixed;
      top: 0;
      left: 320px;
      right: 0;
      height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
    }

    svg {
      display: block;
      width: 100%;
      height: auto;
      min-height: 100vh;
    }

    circle {
      fill: #000;
      cursor: pointer;
      transition: r 0.25s ease, stroke 0.25s ease, opacity 0.25s ease;
    }

    .overlay-box h1 {
      margin: 0 0 8px 0;
      line-height: 1.1;
      font-weight: 700;
    }

    .overlay-box p {
      margin: 0 0 12px 0;
      font-size: 13px;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 10px;
    }

    .search-input {
      appearance: none;
      border: 1px solid #000;
      background: #fff;
      color: #000;
      font: inherit;
      font-size: 12px;
      padding: 7px 10px;
      width: 100%;
      box-sizing: border-box;
      margin: 0;
    }

    button {
      appearance: none;
      border: 1px solid #000;
      background: #fff;
      color: #000;
      font: inherit;
      font-size: 14px;
      padding: 7px 10px;
      cursor: pointer;
      text-align: left;
      width: 100%;
      box-sizing: border-box;
    }

    button.active {
      background: #000;
      color: #fff;
    }

    .search-help {
      width: 100%;
      font-size: 11px;
      line-height: 1.3;
      opacity: 0.7;
      margin-top: 6px;
    }

    .tooltip {
      position: fixed;
      pointer-events: none;
      color: white;
      background: rgba(0,0,0,0.96);
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.35;
      max-width: 220px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      display: none;
      z-index: 30;
    }

    .tooltip .label {
      font-weight: 700;
    }

    .tooltip .case-name {
      font-weight: 700;
      margin-bottom: 6px;
    }

    .cluster-label {
      font-size: 12px;
      font-weight: 700;
      fill: #000;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
    }

    .cluster-count {
      font-size: 11px;
      fill: #000;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
      opacity: 0.75;
    }

    .timeline-label {
      font-size: 11px;
      font-weight: 700;
      fill: #000;
      text-anchor: start;
      dominant-baseline: middle;
      pointer-events: none;
    }

    .timeline-count {
      font-size: 10px;
      fill: #000;
      text-anchor: start;
      dominant-baseline: middle;
      pointer-events: none;
      opacity: 0.7;
    }

    .timeline-axis text {
      font-size: 10px;
      fill: #000;
    }

    .timeline-axis path,
    .timeline-axis line {
      stroke: #000;
      shape-rendering: crispEdges;
    }

    .timeline-band-line {
      stroke: #000;
      stroke-opacity: 0.08;
      shape-rendering: crispEdges;
    }

    .export-box {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 25;
      width: 360px;
      max-height: 70vh;
      overflow: auto;
      padding: 12px;
      background: rgba(255,255,255,0.96);
      border: 1px solid #000;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      display: none;
    }

    .export-box h2 {
      margin: 0 0 8px 0;
      font-size: 14px;
      line-height: 1.1;
    }

    .export-box p {
      margin: 0 0 8px 0;
      font-size: 12px;
      line-height: 1.35;
    }

    .export-box textarea {
      width: 100%;
      min-height: 220px;
      box-sizing: border-box;
      border: 1px solid #000;
      font: 12px/1.35 monospace;
      padding: 8px;
      resize: vertical;
      background: #fff;
      color: #000;
    }
  </style>
</head>
<body>
  <div class="overlay-box">
    <h1>100 Years<br>12,775 Cases</h1>
    <p>
      Supreme Court Dockets 1925 - 2024
    </p>

    <div class="controls">
      <button id="issueClusterBtn">What are these cases about?</button>
      <button id="courtClusterBtn">Where do they come from?</button>
      <button id="timelineIssueBtn">Timeline by issue</button>
      <button id="timelineCourtBtn">Timeline by court</button>
      <button id="releaseBtn">Reset</button>
    </div>

    <input id="searchInput" class="search-input" type="text" placeholder="Search cases, issue, court, state..." />

    <div class="search-help">
      Use <b>,</b> for OR (e.g. roberts, court of appeals) and <b>+</b> for AND (e.g. roberts+court of appeals)
    </div>
  </div>

  <div class="chart-scroll" id="chartScroll">
    <svg id="chart"></svg>
  </div>

  <div id="tooltip" class="tooltip"></div>

  <script>
    const SIDEBAR_WIDTH = 320;
    const CHART_PAD_LEFT = 24;
    const CHART_PAD_RIGHT = 24;
    const CHART_PAD_TOP = 24;
    const CHART_PAD_BOTTOM = 24;

    const chartScroll = document.getElementById("chartScroll");
    const svg = d3.select("#chart");
    const tooltip = d3.select("#tooltip");
    const issueClusterBtn = document.getElementById("issueClusterBtn");
    const courtClusterBtn = document.getElementById("courtClusterBtn");
    const timelineIssueBtn = document.getElementById("timelineIssueBtn");
    const timelineCourtBtn = document.getElementById("timelineCourtBtn");
    const releaseBtn = document.getElementById("releaseBtn");
    const searchInput = document.getElementById("searchInput");


            const minBandHeight = 40;
      const bandPadding = 10;


    let width = chartScroll.clientWidth;
    let height = window.innerHeight;
    let svgHeight = window.innerHeight;

    svg.attr("viewBox", `0 0 ${width} ${svgHeight}`);
    svg.style("height", `${svgHeight}px`);

    const DOT_RADIUS = 3;
    const HOVER_RADIUS = 6;
    const AUTO_RADIUS = 9;

    const BASE_OPACITY = 0.12;
    const ACTIVE_OPACITY = 1.0;

    const SPEED = 0.25;
    const FIELD_SCALE = 0.004;
    const TIME_SCALE = 0.00025;

    const AUTO_POPUP_DURATION = 3000;
    const AUTO_POPUP_GAP = 300;
    const WRAP_MARGIN = 60;

    const CLUSTER_EASE = 0.2;
    const CLUSTER_SPACING = 3;
    const CLUSTER_RADIUS_PADDING = 40;
    const CLUSTER_PACK_SCALE = 1.4;
    const ISSUE_CLUSTER_SPACING = 3;
    const COURT_CLUSTER_SPACING = 3;
    const SEARCH_CLUSTER_SPACING = 3;

    const RELEASE_DURATION = 500;
    const RELEASE_SPEED = 5.2;
    const RELEASE_DAMPING = 0.1;

    const HOVER_REPULSION_RADIUS = 26;
    const HOVER_REPULSION_STRENGTH = 10;
    const HOVER_REPULSION_EASE = 0.22;

    const DATA_PATH = "SCDB_combined_100years.csv";
    const ISSUE_AREA_PATH = "issue_area.csv";
    const CASE_ORIGIN_TYPE_PATH = "case_origin_with_type.csv";

    const MANUAL_CLUSTER_POSITIONS = {
      // "Criminal Procedure": { x: 0.25, y: 0.30 },
      // "Civil Rights": { x: 0.55, y: 0.42 },
      // "Federal Appeals Court": { x: 0.62, y: 0.58 }
    };

    const SEARCH_CLUSTER_POSITIONS = {
      match: { x: 0.25, y: 0.52 },
      other: { x: 0.75, y: 0.52 }
    };

    let dots = [];
    let circles = null;
    let labelLayer = null;
    let axisLayer = null;
    let guideLayer = null;
    let autoActiveDatum = null;
    let hoveredDatum = null;
    let pinnedDatum = null;
    let autoTimeout = null;
    let autoRestartTimeout = null;
    let isUserHovering = false;

    let clusterMode = null; // null | "issue" | "court" | "search" | "timelineIssue" | "timelineCourt"
    let clusterCenters = new Map();
    let clusterCounts = new Map();

    let issueAreaLookup = new Map();
    let caseOriginCourtTypeLookup = new Map();

    let releaseMode = false;
    let releaseEndTime = 0;
    let searchTerm = "";

    function chartLeft() {
      return CHART_PAD_LEFT;
    }

    function chartRight() {
      return width - CHART_PAD_RIGHT;
    }

    function chartTop() {
      return CHART_PAD_TOP;
    }

    function chartBottom() {
      return svgHeight - CHART_PAD_BOTTOM;
    }

    function chartWidth() {
      return chartRight() - chartLeft();
    }

    function chartHeight() {
      return chartBottom() - chartTop();
    }

    function updateExportBox() {
      // placeholder
    }

    function updateSvgHeightForMode() {
      const isTimelineMode = clusterMode === "timelineIssue" || clusterMode === "timelineCourt";

      if (!isTimelineMode) {
        svgHeight = window.innerHeight;
      } else {
        const groupAccessor = clusterMode === "timelineIssue"
          ? d => d.issueAreaGroup
          : d => d.courtTypeGroup;

        const grouped = d3.group(dots, groupAccessor);
        const groupNames = Array.from(grouped.keys()).filter(Boolean).sort(d3.ascending);

        const xMin = chartLeft() + 220;
        const xMax = chartRight();

        const validYears = dots
          .map(d => d.caseDate instanceof Date && !isNaN(d.caseDate) ? d.caseDate.getFullYear() : null)
          .filter(y => y != null);

        let xScale;

        if (validYears.length > 1) {
          xScale = d3.scaleLinear()
            .domain(d3.extent(validYears))
            .range([xMin, xMax]);
        } else {
          xScale = d3.scaleLinear()
            .domain([0, 1])
            .range([xMin, xMax]);
        }

        const laneSpacing = 2;
        const bandPadding = 100;
        const topPad = 140;
        const bottomPad = 40;

        let totalHeight = topPad + bottomPad;

        groupNames.forEach(groupName => {
          const groupDots = grouped.get(groupName) || [];
          const laneOffsets = new Map();

          groupDots.forEach(d => {
            let tx;

            if (d.caseDate instanceof Date && !isNaN(d.caseDate) && validYears.length > 1) {
              tx = xScale(d.caseDate.getFullYear());
            } else if (d.caseDate instanceof Date && !isNaN(d.caseDate) && validYears.length === 1) {
              tx = (xMin + xMax) / 2;
            } else {
              tx = xMax - 10;
            }

            const key = Math.round(tx / 6) * 6;
            laneOffsets.set(key, (laneOffsets.get(key) || 0) + 1);
          });

          const maxStack = laneOffsets.size ? d3.max(Array.from(laneOffsets.values())) : 1;
          const levels = Math.ceil((maxStack - 1) / 2);
          const bandHeight = Math.max(minBandHeight, levels * laneSpacing * 2 + bandPadding);

          totalHeight += bandHeight;
        });

        svgHeight = Math.max(window.innerHeight, totalHeight);
      }

      svg
        .attr("viewBox", `0 0 ${width} ${svgHeight}`)
        .style("height", `${svgHeight}px`);
    }

    function getCurrentClusterSpacing() {
      if (clusterMode === "issue") return ISSUE_CLUSTER_SPACING;
      if (clusterMode === "court") return COURT_CLUSTER_SPACING;
      if (clusterMode === "search") return SEARCH_CLUSTER_SPACING;
      return CLUSTER_SPACING;
    }

    function getEstimatedClusterRadius(count) {
      return CLUSTER_SPACING * Math.sqrt(Math.max(1, count - 1)) + CLUSTER_RADIUS_PADDING;
    }

    function flowAngle(x, y, t, o1, o2) {
      return (
        Math.sin((x * FIELD_SCALE) + t + o1) +
        Math.cos((y * FIELD_SCALE * 1.3) - t * 1.1 + o2) +
        Math.sin(((x + y) * FIELD_SCALE * 0.7) + t * 0.6)
      ) * Math.PI;
    }

    function tooltipHTML(d) {
      return `
        <div class="case-name">${d.caseName || ""}</div>
        <div><span class="label">Chief:</span> ${d.chief || ""}</div>
        <div><span class="label">Docket:</span> ${d.docket || ""}</div>
        <div><span class="label">Issue:</span> ${d.issue || ""}</div>
        <div><span class="label">Issue Area:</span> ${d.issueAreaLabel || d.issueArea || ""}</div>
        <div><span class="label">Case Origin:</span> ${d.caseOrigin || ""}</div>
        <div><span class="label">Court Type:</span> ${d.courtTypeLabel || ""}</div>
        <div><span class="label">Case Origin State:</span> ${d.caseOriginState || ""}</div>
        <div><span class="label">Date:</span> ${d.displayDate || d.term || d.year || ""}</div>
      `;
    }

    function positionTooltip(x, y) {
      const pad = 14;
      const ttNode = tooltip.node();
      const ttWidth = ttNode.offsetWidth;
      const ttHeight = ttNode.offsetHeight;

      let left = x + 16;
      let top = y + 16;

      if (left + ttWidth > window.innerWidth - pad) {
        left = x - ttWidth - 16;
      }

      if (top + ttHeight > window.innerHeight - pad) {
        top = y - ttHeight - 16;
      }

      tooltip
        .style("left", `${Math.max(pad, left)}px`)
        .style("top", `${Math.max(pad, top)}px`);
    }

    function showTooltipForDatum(d) {
      tooltip.style("display", "block").html(tooltipHTML(d));
      positionTooltip(d.x, d.y);
    }

    function hideTooltip() {
      tooltip.style("display", "none");
    }

    function getActiveDatum() {
      return pinnedDatum || hoveredDatum || autoActiveDatum;
    }

    function updateCircleStyles() {
      if (!circles) return;

      const activeDatum = getActiveDatum();

      circles
        .attr("r", d => {
          if (pinnedDatum && d === pinnedDatum) return HOVER_RADIUS;
          if (hoveredDatum && d === hoveredDatum) return HOVER_RADIUS;
          if (!hoveredDatum && !pinnedDatum && autoActiveDatum && d === autoActiveDatum) return AUTO_RADIUS;
          return DOT_RADIUS;
        })
        .attr("stroke", d => activeDatum && d === activeDatum ? "#000" : "none")
        .attr("stroke-width", d => activeDatum && d === activeDatum ? 1.5 : 0)
        .style("opacity", d => activeDatum ? (d === activeDatum ? ACTIVE_OPACITY : BASE_OPACITY) : BASE_OPACITY);
    }

    function clearAutoTimers() {
      if (autoTimeout) clearTimeout(autoTimeout);
      if (autoRestartTimeout) clearTimeout(autoRestartTimeout);
      autoTimeout = null;
      autoRestartTimeout = null;
    }

    function scheduleNextAutoPopup(delay = AUTO_POPUP_GAP) {
      if (clusterMode || pinnedDatum) return;
      autoRestartTimeout = setTimeout(runAutoPopup, delay);
    }

    function runAutoPopup() {
      if (!dots.length || isUserHovering || clusterMode || pinnedDatum) {
        if (!clusterMode && !pinnedDatum) scheduleNextAutoPopup(500);
        return;
      }

      autoActiveDatum = dots[Math.floor(Math.random() * dots.length)];
      updateCircleStyles();
      showTooltipForDatum(autoActiveDatum);

      autoTimeout = setTimeout(() => {
        autoActiveDatum = null;
        updateCircleStyles();
        if (!isUserHovering && !pinnedDatum) hideTooltip();
        scheduleNextAutoPopup();
      }, AUTO_POPUP_DURATION);
    }

    function normalizeCode(value) {
      return String(value == null ? "" : value).trim();
    }

    function normalizeLabel(value, fallback = "Unknown") {
      const v = String(value == null ? "" : value).trim();
      return v === "" ? fallback : v;
    }

    function normalizeSearchText(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function buildIssueAreaLookup(rows) {
      issueAreaLookup = new Map();

      rows.forEach(row => {
        const code = normalizeCode(row.issue_area_code);
        const label = normalizeLabel(row.issue_area);
        if (code !== "") {
          issueAreaLookup.set(code, label);
        }
      });
    }

    function buildCaseOriginCourtTypeLookup(rows) {
      caseOriginCourtTypeLookup = new Map();

      rows.forEach(row => {
        const code = normalizeCode(row.case_origin_code);
        const courtType = normalizeLabel(row.court_type);
        if (code !== "") {
          caseOriginCourtTypeLookup.set(code, courtType);
        }
      });
    }

    function getIssueAreaLabelFromCode(code) {
      const normalized = normalizeCode(code);
      if (normalized === "") return "Unknown";
      return issueAreaLookup.get(normalized) || normalized;
    }

    function getCourtTypeFromCaseOriginCode(code) {
      const normalized = normalizeCode(code);
      if (normalized === "") return "Unknown";
      return caseOriginCourtTypeLookup.get(normalized) || "Unknown";
    }

    function parseNumberMaybe(v) {
      const n = +v;
      return Number.isFinite(n) ? n : null;
    }

    function parseCaseDate(d) {
      const directDateCandidates = [
        d.decisionDate,
        d.dateDecision,
        d.date_decision,
        d.dateDecisionStr,
        d.date,
        d.decision_date
      ].filter(Boolean);

      for (const value of directDateCandidates) {
        const parsed = new Date(value);
        if (!isNaN(parsed)) return parsed;
      }

      const year = parseNumberMaybe(d.term) ??
                   parseNumberMaybe(d.year) ??
                   parseNumberMaybe(d.decisionYear) ??
                   parseNumberMaybe(d.dateDecisionYear);

      const month = parseNumberMaybe(d.dateDecisionMonth) ??
                    parseNumberMaybe(d.decisionMonth) ??
                    1;

      const day = parseNumberMaybe(d.dateDecisionDay) ??
                  parseNumberMaybe(d.decisionDay) ??
                  1;

      if (year != null) {
        const parsed = new Date(year, Math.max(0, month - 1), Math.max(1, day));
        if (!isNaN(parsed)) return parsed;
      }

      return null;
    }

    function formatCaseDateForDisplay(dateObj, d) {
      if (dateObj) {
        return d3.timeFormat("%b. %-d, %Y")(dateObj);
      }
      return d.term || d.year || "";
    }

    function getSearchValue(d) {
      const raw = searchTerm.trim();
      if (!raw) return null;

      const haystack = d.searchTextNormalized || "";

      const orGroups = raw
        .split(",")
        .map(part => part.trim())
        .filter(Boolean);

      const isMatch = orGroups.some(group => {
        const andTerms = group
          .split("+")
          .map(term => normalizeSearchText(term))
          .filter(Boolean);

        if (!andTerms.length) return false;

        return andTerms.every(term => haystack.includes(term));
      });

      return isMatch ? raw : "Other cases";
    }

    function getGroupValue(d) {
      if (clusterMode === "issue") return d.issueAreaGroup;
      if (clusterMode === "court") return d.courtTypeGroup;
      if (clusterMode === "search") return getSearchValue(d);
      if (clusterMode === "timelineIssue") return d.issueAreaGroup;
      if (clusterMode === "timelineCourt") return d.courtTypeGroup;
      return null;
    }

    function ensureLayers() {
      if (!guideLayer) {
        guideLayer = svg.append("g").attr("class", "guide-layer");
      }
      if (!labelLayer) {
        labelLayer = svg.append("g").attr("class", "cluster-label-layer");
      }
      if (!axisLayer) {
        axisLayer = svg.append("g").attr("class", "axis-layer");
      }
    }

    function clearTimelineGuides() {
      if (guideLayer) guideLayer.selectAll("*").remove();
      if (axisLayer) axisLayer.selectAll("*").remove();
    }

    function renderClusterLabels(groupNames) {
      ensureLayers();

      const labelData = groupNames.map(groupName => ({
        groupName,
        x: clusterCenters.get(groupName).x,
        y: clusterCenters.get(groupName).y,
        count: clusterCounts.get(groupName) || 0
      }));

      const groups = labelLayer
        .selectAll("g.cluster-label-group")
        .data(labelData, d => d.groupName);

      const groupsEnter = groups
        .enter()
        .append("g")
        .attr("class", "cluster-label-group");

      groupsEnter.append("text").attr("class", "cluster-label");
      groupsEnter.append("text").attr("class", "cluster-count");

      const merged = groupsEnter.merge(groups);

      merged.style("opacity", clusterMode && clusterMode !== "timelineIssue" && clusterMode !== "timelineCourt" ? 1 : 0);

      merged
        .select(".cluster-label")
        .attr("x", d => d.x)
        .attr("y", d => d.y - 7)
        .text(d => d.groupName);

      merged
        .select(".cluster-count")
        .attr("x", d => d.x)
        .attr("y", d => d.y + 9)
        .text(d => d3.format(",")(d.count));

      groups.exit().remove();
    }

    function renderTimelineLabels(groupNames, bandCenters, xMin) {
      ensureLayers();

      const labelData = groupNames.map(groupName => ({
        groupName,
        x: xMin - 185,
        y: bandCenters.get(groupName),
        count: clusterCounts.get(groupName) || 0
      }));

      const groups = labelLayer
        .selectAll("g.cluster-label-group")
        .data(labelData, d => d.groupName);

      const groupsEnter = groups
        .enter()
        .append("g")
        .attr("class", "cluster-label-group");

      groupsEnter.append("text").attr("class", "timeline-label");
      groupsEnter.append("text").attr("class", "timeline-count");

      const merged = groupsEnter.merge(groups);

      merged.style("opacity", (clusterMode === "timelineIssue" || clusterMode === "timelineCourt") ? 1 : 0);

      merged
        .select(".timeline-label")
        .attr("x", d => d.x)
        .attr("y", d => d.y - 6)
        .text(d => d.groupName);

      merged
        .select(".timeline-count")
        .attr("x", d => d.x)
        .attr("y", d => d.y + 8)
        .text(d => d3.format(",")(d.count));

      groups.exit().remove();
    }

    function updateClusterLabelVisibility() {
      if (!labelLayer) return;

      const timelineMode = clusterMode === "timelineIssue" || clusterMode === "timelineCourt";

      labelLayer.selectAll(".cluster-label").style("opacity", clusterMode && !timelineMode ? 1 : 0);
      labelLayer.selectAll(".cluster-count").style("opacity", clusterMode && !timelineMode ? 0.75 : 0);
      labelLayer.selectAll(".timeline-label").style("opacity", timelineMode ? 1 : 0);
      labelLayer.selectAll(".timeline-count").style("opacity", timelineMode ? 0.7 : 0);
    }

    function assignTimelineTargets(groupAccessor) {
      ensureLayers();
      clearTimelineGuides();

      clusterCenters = new Map();
      clusterCounts = new Map();

      const grouped = d3.group(dots, groupAccessor);
      const groupNames = Array.from(grouped.keys()).filter(Boolean).sort(d3.ascending);

      const xMin = chartLeft() + 220;
      const xMax = chartRight();
      const yMin = chartTop() + 96;

      const validYears = dots
        .map(d => d.caseDate instanceof Date && !isNaN(d.caseDate) ? d.caseDate.getFullYear() : null)
        .filter(y => y != null);

      let xScale;

      if (validYears.length > 1) {
        xScale = d3.scaleLinear()
          .domain(d3.extent(validYears))
          .range([xMin, xMax]);
      } else {
        xScale = d3.scaleLinear()
          .domain([0, 1])
          .range([xMin, xMax]);
      }

      const laneSpacing = 2;
      const bandCenters = new Map();
      const bandHeights = new Map();

      groupNames.forEach(groupName => {
        const groupDots = grouped.get(groupName) || [];
        const laneOffsets = new Map();

        groupDots.forEach(d => {
          let tx;

          if (d.caseDate instanceof Date && !isNaN(d.caseDate) && validYears.length > 1) {
            tx = xScale(d.caseDate.getFullYear());
          } else if (d.caseDate instanceof Date && !isNaN(d.caseDate) && validYears.length === 1) {
            tx = (xMin + xMax) / 2;
          } else {
            tx = xMax - 10;
          }

          const key = Math.round(tx / 6) * 6;
          laneOffsets.set(key, (laneOffsets.get(key) || 0) + 1);
        });

        const maxStack = laneOffsets.size ? d3.max(Array.from(laneOffsets.values())) : 1;
        const levels = Math.ceil((maxStack - 1) / 2);
        const bandHeight = Math.max(minBandHeight, levels * laneSpacing * 2 + bandPadding);

        bandHeights.set(groupName, bandHeight);
      });

      let cursorY = yMin;

      groupNames.forEach(groupName => {
        const bandHeight = bandHeights.get(groupName);
        const cy = cursorY + bandHeight / 2;

        bandCenters.set(groupName, cy);

        const groupDots = grouped.get(groupName) || [];
        clusterCounts.set(groupName, groupDots.length);
        clusterCenters.set(groupName, { x: xMin, y: cy });

        cursorY += bandHeight;
      });

      groupNames.forEach(groupName => {
        const groupDots = (grouped.get(groupName) || []).slice();

        groupDots.sort((a, b) => {
          const ay = a.caseDate instanceof Date && !isNaN(a.caseDate) ? a.caseDate.getFullYear() : Number.POSITIVE_INFINITY;
          const by = b.caseDate instanceof Date && !isNaN(b.caseDate) ? b.caseDate.getFullYear() : Number.POSITIVE_INFINITY;
          const at = a.caseDate ? a.caseDate.getTime() : Number.POSITIVE_INFINITY;
          const bt = b.caseDate ? b.caseDate.getTime() : Number.POSITIVE_INFINITY;
          return d3.ascending(ay, by) || d3.ascending(at, bt) || d3.ascending(a.id, b.id);
        });

        const laneOffsets = new Map();

        groupDots.forEach(d => {
          let tx;

          if (d.caseDate instanceof Date && !isNaN(d.caseDate) && validYears.length > 1) {
            tx = xScale(d.caseDate.getFullYear());
          } else if (d.caseDate instanceof Date && !isNaN(d.caseDate) && validYears.length === 1) {
            tx = (xMin + xMax) / 2;
          } else {
            tx = xMax - 10;
          }

          const key = Math.round(tx / 6) * 6;
          const laneIndex = laneOffsets.get(key) || 0;
          laneOffsets.set(key, laneIndex + 1);

          const offsetPattern = laneIndex === 0
            ? 0
            : ((laneIndex % 2 === 1 ? 1 : -1) * Math.ceil(laneIndex / 2) * laneSpacing);

          d.targetX = tx;
          d.targetY = bandCenters.get(groupName) + offsetPattern;
        });
      });

      const guideLines = groupNames.map(groupName => ({
        groupName,
        y: bandCenters.get(groupName)
      }));

      guideLayer.selectAll("line.timeline-band-line")
        .data(guideLines, d => d.groupName)
        .join("line")
        .attr("class", "timeline-band-line")
        .attr("x1", xMin)
        .attr("x2", xMax)
        .attr("y1", d => d.y)
        .attr("y2", d => d.y);

      const axisG = axisLayer
        .append("g")
        .attr("class", "timeline-axis")
        .attr("transform", `translate(0, ${yMin - 28})`);

      if (validYears.length > 1) {
        const [minYear, maxYear] = d3.extent(validYears);
        const spanYears = maxYear - minYear;
        const tickStep = spanYears > 30 ? 10 : 5;

        axisG.call(
          d3.axisTop(xScale)
            .tickValues(
              d3.range(
                Math.ceil(minYear / tickStep) * tickStep,
                maxYear + 1,
                tickStep
              )
            )
            .tickFormat(d3.format("d"))
        );
      } else {
        axisG.call(d3.axisTop(xScale).ticks(2));
      }

      renderTimelineLabels(groupNames, bandCenters, xMin);
    }

    function assignTimelineIssueTargets() {
      assignTimelineTargets(d => d.issueAreaGroup);
    }

    function assignTimelineCourtTargets() {
      assignTimelineTargets(d => d.courtTypeGroup);
    }

    function assignClusterTargets() {
      ensureLayers();

      if (!clusterMode) {
        clearTimelineGuides();
        updateClusterLabelVisibility();
        return;
      }

      if (clusterMode === "timelineIssue") {
        assignTimelineIssueTargets();
        updateClusterLabelVisibility();
        return;
      }

      if (clusterMode === "timelineCourt") {
        assignTimelineCourtTargets();
        updateClusterLabelVisibility();
        return;
      }

      clearTimelineGuides();

      const grouped = d3.group(dots, d => getGroupValue(d));
      const groupNames = Array.from(grouped.keys()).filter(Boolean).sort(d3.ascending);

      if (clusterMode === "search") {
        clusterCenters = new Map();
        clusterCounts = new Map();

        const matchX = chartLeft() + chartWidth() * SEARCH_CLUSTER_POSITIONS.match.x;
        const matchY = chartTop() + chartHeight() * SEARCH_CLUSTER_POSITIONS.match.y;
        const otherX = chartLeft() + chartWidth() * SEARCH_CLUSTER_POSITIONS.other.x;
        const otherY = chartTop() + chartHeight() * SEARCH_CLUSTER_POSITIONS.other.y;

        groupNames.forEach(groupName => {
          const isMatchGroup = groupName === searchTerm;
          const cx = isMatchGroup ? matchX : otherX;
          const cy = isMatchGroup ? matchY : otherY;
          const groupDots = grouped.get(groupName);

          clusterCenters.set(groupName, { x: cx, y: cy });
          clusterCounts.set(groupName, groupDots.length);

          groupDots.forEach((d, j) => {
            const angle = j * 2.399963229728653;
            const radius = getCurrentClusterSpacing() * Math.sqrt(j);
            d.targetX = cx + Math.cos(angle) * radius;
            d.targetY = cy + Math.sin(angle) * radius;
          });
        });

        renderClusterLabels(groupNames);
        return;
      }

      clusterCenters = new Map();
      clusterCounts = new Map();

      const packedNodes = groupNames.map(groupName => {
        const count = grouped.get(groupName).length;
        return {
          groupName,
          count,
          r: getEstimatedClusterRadius(count)
        };
      });

      const manualNodes = [];
      const autoNodes = [];

      packedNodes.forEach(node => {
        const manual = MANUAL_CLUSTER_POSITIONS[node.groupName];
        if (manual) {
          manualNodes.push({
            ...node,
            x: chartLeft() + manual.x * chartWidth(),
            y: chartTop() + manual.y * chartHeight()
          });
        } else {
          autoNodes.push({ ...node });
        }
      });

      if (autoNodes.length) {
        d3.packSiblings(autoNodes);

        let minX = d3.min(autoNodes, d => d.x - d.r);
        let maxX = d3.max(autoNodes, d => d.x + d.r);
        let minY = d3.min(autoNodes, d => d.y - d.r);
        let maxY = d3.max(autoNodes, d => d.y + d.r);

        const packedWidth = Math.max(1, maxX - minX);
        const packedHeight = Math.max(1, maxY - minY);

        const padX = 80;
        const padY = 90;

        const availableWidth = Math.max(1, chartWidth() - padX * 2);
        const availableHeight = Math.max(1, chartHeight() - padY * 2);

        const scale = Math.min(
          availableWidth / packedWidth,
          availableHeight / packedHeight
        ) * CLUSTER_PACK_SCALE;

        const packedCx = (minX + maxX) / 2;
        const packedCy = (minY + maxY) / 2;
        const targetCx = chartLeft() + chartWidth() / 2;
        const targetCy = chartTop() + chartHeight() / 2;

        autoNodes.forEach(node => {
          node.x = targetCx + (node.x - packedCx) * scale;
          node.y = targetCy + (node.y - packedCy) * scale;
          node.r = node.r * scale;
        });
      }

      const finalNodes = [...manualNodes, ...autoNodes];

      finalNodes.forEach(node => {
        clusterCenters.set(node.groupName, { x: node.x, y: node.y });
        clusterCounts.set(node.groupName, node.count);

        const groupDots = grouped.get(node.groupName);

        groupDots.forEach((d, j) => {
          const angle = j * 2.399963229728653;
          const radius = getCurrentClusterSpacing() * Math.sqrt(j);
          d.targetX = node.x + Math.cos(angle) * radius;
          d.targetY = node.y + Math.sin(angle) * radius;
        });
      });

      renderClusterLabels(groupNames);
    }

    function updateButtonStates() {
      issueClusterBtn.classList.toggle("active", clusterMode === "issue");
      courtClusterBtn.classList.toggle("active", clusterMode === "court");
      timelineIssueBtn.classList.toggle("active", clusterMode === "timelineIssue");
      timelineCourtBtn.classList.toggle("active", clusterMode === "timelineCourt");
    }

    function enableClusterMode(mode) {
      if (clusterMode === mode) return;

      clusterMode = mode;
      updateSvgHeightForMode();
      updateButtonStates();
      assignClusterTargets();
      updateClusterLabelVisibility();

      clearAutoTimers();
      autoActiveDatum = null;
      releaseMode = false;
      dots.forEach(d => {
        d.vx = 0;
        d.vy = 0;
      });
      hideTooltip();
      updateCircleStyles();
    }

    function disableClusterMode() {
      if (!clusterMode) return;

      clusterMode = null;
      updateSvgHeightForMode();
      updateButtonStates();
      clearTimelineGuides();
      updateClusterLabelVisibility();
      updateCircleStyles();
    }

    function startRelease() {
      const priorMode = clusterMode;
      if (!priorMode) return;

      disableClusterMode();

      releaseMode = true;
      releaseEndTime = performance.now() + RELEASE_DURATION;

      dots.forEach(d => {
        const groupValue = priorMode === "issue"
          ? d.issueAreaGroup
          : priorMode === "court"
            ? d.courtTypeGroup
            : priorMode === "timelineIssue"
              ? d.issueAreaGroup
              : priorMode === "timelineCourt"
                ? d.courtTypeGroup
                : getSearchValue(d);

        const center = clusterCenters.get(groupValue);
        if (!center) return;

        let dx = d.x - center.x;
        let dy = d.y - center.y;
        let dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < 0.001) {
          const angle = Math.random() * Math.PI * 2;
          dx = Math.cos(angle);
          dy = Math.sin(angle);
          dist = 1;
        }

        d.vx = (dx / dist) * RELEASE_SPEED;
        d.vy = (dy / dist) * RELEASE_SPEED;
      });

      chartScroll.scrollTop = 0;

      if (!isUserHovering && !pinnedDatum) {
        scheduleNextAutoPopup(1000);
      }
    }

    function applySearchCluster() {
      const q = searchInput.value.trim();
      searchTerm = q;

      if (q) {
        clusterMode = "search";
        updateSvgHeightForMode();
        updateButtonStates();
        assignClusterTargets();
        updateClusterLabelVisibility();

        clearAutoTimers();
        autoActiveDatum = null;
        releaseMode = false;
        dots.forEach(d => {
          d.vx = 0;
          d.vy = 0;
        });
        hideTooltip();
        updateCircleStyles();
      } else if (clusterMode === "search") {
        disableClusterMode();
        if (!isUserHovering && !pinnedDatum) {
          scheduleNextAutoPopup(500);
        }
      }
    }

    Promise.all([
      d3.csv(DATA_PATH),
      d3.csv(ISSUE_AREA_PATH),
      d3.csv(CASE_ORIGIN_TYPE_PATH)
    ]).then(([rawData, issueAreaRows, caseOriginTypeRows]) => {
      buildIssueAreaLookup(issueAreaRows);
      buildCaseOriginCourtTypeLookup(caseOriginTypeRows);

      dots = rawData.map((d, i) => {
        const issueAreaLabel = getIssueAreaLabelFromCode(d.issueArea);
        const courtTypeLabel = getCourtTypeFromCaseOriginCode(d.caseOrigin);

        const searchText = [
          d.caseName,
          d.chief,
          d.docket,
          d.issue,
          issueAreaLabel,
          courtTypeLabel,
          d.caseOrigin,
          d.caseOriginState
        ].filter(Boolean).join(" ");

        const searchTextNormalized = normalizeSearchText(searchText);
        const caseDate = parseCaseDate(d);
        const displayDate = formatCaseDateForDisplay(caseDate, d);

        return {
          ...d,
          id: i,
          issueAreaLabel,
          issueAreaGroup: issueAreaLabel,
          courtTypeLabel,
          courtTypeGroup: courtTypeLabel,
          searchText,
          searchTextNormalized,
          caseDate,
          displayDate,
          x: chartLeft() + Math.random() * chartWidth(),
          y: chartTop() + Math.random() * chartHeight(),
          targetX: null,
          targetY: null,
          offset1: Math.random() * 1000,
          offset2: Math.random() * 1000,
          vx: 0,
          vy: 0
        };
      });

      updateSvgHeightForMode();

      const dotLayer = svg.append("g").attr("class", "dot-layer");
      ensureLayers();

      circles = dotLayer
        .selectAll("circle")
        .data(dots)
        .join("circle")
        .attr("r", DOT_RADIUS)
        .attr("cx", d => d.x)
        .attr("cy", d => d.y)
        .style("opacity", BASE_OPACITY)
        .on("mouseenter", function(event, d) {
          isUserHovering = true;
          autoActiveDatum = null;
          clearAutoTimers();

          if (!pinnedDatum || pinnedDatum === d) {
            hoveredDatum = d;
            tooltip.style("display", "block").html(tooltipHTML(d));
            positionTooltip(event.clientX, event.clientY);
          }

          updateCircleStyles();
        })
        .on("mousemove", function(event, d) {
          if (pinnedDatum && pinnedDatum !== d) return;
          if (hoveredDatum || pinnedDatum) {
            positionTooltip(event.clientX, event.clientY);
          }
        })
        .on("mouseleave", function() {
          isUserHovering = false;

          if (!pinnedDatum) {
            hoveredDatum = null;
            hideTooltip();
          } else {
            hoveredDatum = null;
          }

          updateCircleStyles();

          if (!clusterMode && !pinnedDatum) {
            scheduleNextAutoPopup(500);
          }
        })
        .on("click", function(event, d) {
          event.stopPropagation();

          autoActiveDatum = null;
          clearAutoTimers();

          if (pinnedDatum === d) {
            pinnedDatum = null;
            hoveredDatum = null;
            hideTooltip();

            if (!clusterMode) {
              scheduleNextAutoPopup(500);
            }
          } else {
            pinnedDatum = d;
            hoveredDatum = null;
            tooltip.style("display", "block").html(tooltipHTML(d));
            positionTooltip(event.clientX, event.clientY);
          }

          updateCircleStyles();
        });

      svg.on("click", function() {
        pinnedDatum = null;
        hoveredDatum = null;
        hideTooltip();
        updateCircleStyles();

        if (!clusterMode) {
          scheduleNextAutoPopup(500);
        }
      });

      function tick(elapsed) {
        const t = elapsed * TIME_SCALE;

        if (releaseMode && performance.now() > releaseEndTime) {
          releaseMode = false;
          dots.forEach(d => {
            d.vx = 0;
            d.vy = 0;
          });
        }

        dots.forEach(d => {
          if (clusterMode) {
            let tx = d.targetX;
            let ty = d.targetY;

            const focusDatum = pinnedDatum || hoveredDatum;
            const isTimelineMode = clusterMode === "timelineIssue" || clusterMode === "timelineCourt";

            if (isTimelineMode && focusDatum && d !== focusDatum) {
              const dx = d.targetX - focusDatum.targetX;
              const dy = d.targetY - focusDatum.targetY;
              const dist = Math.sqrt(dx * dx + dy * dy);

              if (dist > 0 && dist < HOVER_REPULSION_RADIUS) {
                const force = (1 - dist / HOVER_REPULSION_RADIUS) * HOVER_REPULSION_STRENGTH;
                tx += (dx / dist) * force;
                ty += (dy / dist) * force;
              }
            }

            d.x += (tx - d.x) * (isTimelineMode ? HOVER_REPULSION_EASE : CLUSTER_EASE);
            d.y += (ty - d.y) * (isTimelineMode ? HOVER_REPULSION_EASE : CLUSTER_EASE);
          } else {
            const a = flowAngle(d.x, d.y, t, d.offset1, d.offset2);

            if (releaseMode) {
              d.x += d.vx + Math.cos(a) * SPEED;
              d.y += d.vy + Math.sin(a) * SPEED;

              d.vx *= RELEASE_DAMPING;
              d.vy *= RELEASE_DAMPING;
            } else {
              d.x += Math.cos(a) * SPEED;
              d.y += Math.sin(a) * SPEED;
            }

            if (d.x < chartLeft() - WRAP_MARGIN) d.x = chartRight() + WRAP_MARGIN;
            if (d.x > chartRight() + WRAP_MARGIN) d.x = chartLeft() - WRAP_MARGIN;
            if (d.y < chartTop() - WRAP_MARGIN) d.y = chartBottom() + WRAP_MARGIN;
            if (d.y > chartBottom() + WRAP_MARGIN) d.y = chartTop() - WRAP_MARGIN;
          }
        });

        circles
          .attr("cx", d => d.x)
          .attr("cy", d => d.y);

        const activeDatum = getActiveDatum();
        if (activeDatum && pinnedDatum) {
          positionTooltip(activeDatum.x, activeDatum.y);
        } else if (activeDatum && !isUserHovering && !clusterMode) {
          positionTooltip(activeDatum.x, activeDatum.y);
        }
      }

      updateCircleStyles();
      d3.timer(tick);
      scheduleNextAutoPopup(1000);
    }).catch(error => {
      console.error("Error loading CSV files:", error);
    });

    issueClusterBtn.addEventListener("click", () => {
      chartScroll.scrollTop = 0;
      enableClusterMode("issue");
    });

    courtClusterBtn.addEventListener("click", () => {
      chartScroll.scrollTop = 0;
      enableClusterMode("court");
    });

    timelineIssueBtn.addEventListener("click", () => {
      chartScroll.scrollTop = 0;
      enableClusterMode("timelineIssue");
    });

    timelineCourtBtn.addEventListener("click", () => {
      chartScroll.scrollTop = 0;
      enableClusterMode("timelineCourt");
    });

    releaseBtn.addEventListener("click", startRelease);
    searchInput.addEventListener("input", applySearchCluster);

    window.addEventListener("resize", () => {
      width = chartScroll.clientWidth;
      height = window.innerHeight;
      updateSvgHeightForMode();

      if (dots.length && clusterMode) {
        assignClusterTargets();
        updateClusterLabelVisibility();
      }

      updateExportBox();
    });
  </script>
</body>
</html>
